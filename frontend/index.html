<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NiraVaani AI</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 0;
}

.container {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(20px);
    padding: 40px;
    border-radius: 20px;
    width: 450px;
    color: white;
    text-align: center;
}

input, button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    margin-top: 10px;
}

.voice-btn { background: #22c55e; }
.analyze-btn { background: #3b82f6; }

.result {
    margin-top: 20px;
    padding: 15px;
    background: rgba(255,255,255,0.2);
    border-radius: 10px;
    text-align: left;
}

.low { color: #4ade80; }
.medium { color: #facc15; }
.high { color: #f87171; }
</style>
</head>

<body>

<div class="container">
<h2>🩺 NiraVaani</h2>
<p>Speak in Tamil or English</p>

<input type="text" id="symptoms">

<button class="voice-btn" onclick="startVoice()">🎤 Speak</button>
<button class="analyze-btn" onclick="getPrediction()">Analyze</button>

<div id="result" class="result"></div>
</div>

<script>

// 🎤 Voice (Tamil + English)
function startVoice() {
    const recognition = new webkitSpeechRecognition();
    recognition.lang = "ta-IN";

    recognition.onresult = function(event) {
        document.getElementById("symptoms").value =
            event.results[0][0].transcript;
    };

    recognition.start();
}

// 🌍 Translation Layer
function translate(text) {
    text = text.toLowerCase();

    if (text.includes("காய்ச்சல்") || text.includes("fever"))
        return "fever";

    if (text.includes("வலி") || text.includes("pain"))
        return "pain";

    if (text.includes("மயக்கம்") || text.includes("dizzy"))
        return "dizzy";

    if (text.includes("சோர்வு") || text.includes("weak"))
        return "weak";

    return text;
}

// 🤖 API Call
async function getPrediction() {
    let text = document.getElementById("symptoms").value;
    text = translate(text);

    const response = await fetch("http://127.0.0.1:5000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ text: text })
    });

    const data = await response.json();

    document.getElementById("result").innerHTML = `
        <p><b>Symptoms:</b> ${data.symptoms.join(", ")}</p>
        <p><b>Risk:</b> <span class="${data.risk}">${data.risk}</span></p>
        <p>${data.explanation}</p>
        <p><b>History:</b> ${data.history_flag}</p>
        <p><b>Suggestion:</b> ${data.follow_up}</p>
    `;
}

</script>

</body>
</html>
